<!DOCTYPE html>
<html>
  <head>
    <title>The Tate Files</title>
    <style>
      table {
        border-collapse: collapse;
        width: 100%;
      }
      th, td {
        padding: 8px;
        text-align: left;
      }
      h2 {
        text-align: center;
      }
    </style>
  </head>
  <body>
    <h2>The Tate Files</h2>
    <table id="myTable">
      <thead>
        <tr>
          <th>Date</th>
          <th>Title</th>
          <th>Transcript</th>
          <th>Video Link</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>Apr 2022</td>
          <td>Andrew Tate's Final Message</td>
          <td><a href="transcripts/final_message.html">View Transcript</a></td>
          <td><a href="https://www.youtube.com/watch?v=SK2tlXFg8tM&t=6s">Watch Video</a></td>
        </tr>
        <tr>
          <td>Dec 2018</td>
          <td>PhD course</td>
          <td><a href="transcripts/andrew_tate_phd.html">View Transcript</a></td>
          <td><a href="https://www.youtube.com/watch?v=htYdpp0LxOE&t=872s">Watch Video</a></td>
        </tr>
        <tr>
          <td>Apr 2020</td>
          <td>Only Fans Elites FULL Course</td>
          <td><a href="../only_fans_html/only_fans.html">View Transcript</a></td>
          <td><a href="https://www.youtube.com/watch?v=y3n7HB03UK8&t=529s">Watch Video</a></td>
        </tr>
      </tbody>
    </table>

    <script>
      // Get the table rows and convert them to an array
      var table = document.getElementById("myTable");
      var tbody = table.getElementsByTagName("tbody")[0];
      var rows = Array.from(tbody.rows);

      // Extract the date values and sort them in ascending order
      var dates = rows.map(function(row) {
        return new Date(row.cells[0].textContent.trim());
      });
      dates.sort(function(a, b) {
        return a - b;
      });

      // Create a new array of sorted rows
      var sortedRows = dates.map(function(date) {
        var dateString = date.toLocaleDateString("en-US", { month: "short", year: "numeric" });
        return rows.find(function(row) {
          return row.cells[0].textContent.trim() === dateString;
        });
      });

      // Update the table with the sorted rows
      sortedRows.forEach(function(row) {
        tbody.appendChild(row);
      });
    </script>
  </body>
</html>
