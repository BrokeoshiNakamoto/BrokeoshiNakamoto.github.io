<!DOCTYPE html>
<html>
  <head>
    <title>My Static Website</title>
    <style>
      table {
        border-collapse: collapse;
        width: 100%;
      }
      th, td {
        padding: 8px;
        text-align: left;
      }
    </style>
  </head>
  <body>
    <!-- <img src="Andrew_Tate_PhD_Course.png" alt="My Image" width="400" height="300">-->
    <!--<img src="Andrew_Tate_PhD_Course.png" alt="Image description">-->

    <h2>Transcripts and Video Links</h2>
    <table id="myTable">
      <thead>
        <tr>
          <th>Date</th>
          <th>Title</th>
          <th>Transcript</th>
          <th>Video Link</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>Apr,2022</td>
          <td>Andrew Tate's Final Message</td>
          <td><a href="andrew_tates_final_message.html">View Transcript</a></td>
          <td><a href="https://www.youtube.com/watch?v=SK2tlXFg8tM&t=6s">Watch Video</a></td>
        </tr>
        <tr>
          <td>Dec,2018</td>
          <td>PhD course</td>
          <td><a href="phd_html/phd_course.html">View Transcript</a></td>
          <td><a href="https://www.youtube.com/watch?v=htYdpp0LxOE&t=872s">Watch Video</a></td>
        </tr>
        <tr>
          <td>Apr,2020</td>
          <td>Only Fans Elites FULL Course</td>
          <td><a href="https://www.example.com/transcript3">View Transcript</a></td>
          <td><a href="https://www.youtube.com/watch?v=y3n7HB03UK8&t=529s">Watch Video</a></td>
        </tr>
      </tbody>
    </table>

    <script>
      // Get the table rows and convert them to an array
      var table = document.getElementById("myTable");
      var tbody = table.getElementsByTagName("tbody")[0];
      var rows = Array.from(tbody.rows);

      // Extract the date values and sort them in ascending order
      var dates = rows.map(function(row) {
        return new Date(row.cells[0].textContent.trim());
      });
      dates.sort(function(a, b) {
        return a - b;
      });

      // Update the table with the sorted data
      dates.forEach(function(date) {
        var dateString = date.toLocaleDateString("en-US", { month: "short", year: "numeric" });
        var row = rows.find(function(row) {
          return row.cells[0].textContent.trim() === dateString;
        });
        tbody.appendChild(row);
      });
    </script>
  </body>
</html>
