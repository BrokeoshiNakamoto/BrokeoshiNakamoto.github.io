<!DOCTYPE html>
<html>
<head>
    <title>{{ title }}</title>
    <meta charset="UTF-8">
    <style>
        .back-button {
            position: absolute;
            top: 0;
            right: 0;
            padding: 10px;
            background-color: #f00;
            color: #fff;
            text-decoration: none;
        }
        .video-container {
            margin-top: 20px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
        }
        .video {
            flex: 1;
            margin-right: 20px;
        }
        .image-container {
            flex: 1;
            max-width: 700px;
            margin-top: 20px;
        }
        .image-container img {
            max-width: 100%;
            height: auto;
        }
    </style>
</head>
<body>
    <a href="#" class="back-button">Back</a>
    <div class="video-container">
        <div class="video">
            <iframe width="420" height="345" src="{{ video_url }}"></iframe>
        </div>
        <div class="image-container">
            <img src="{{ image_url }}" alt="Image">
        </div>
    </div>
    <h1>Transcript</h1>
    <p>{{ transcript }}</p>
    <iframe src="{{ transcript_url }}" width="100%" height="500px"></iframe>
</body>
</html>
